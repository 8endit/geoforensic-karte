<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bodenbericht – Grundstücks-Screening in Minuten</title>
  <meta name="description" content="Das GeoForensic-Projekt ist in Bodenbericht aufgegangen. Weiterleitung zu bodenbericht.de.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://bodenbericht.de/">

  <!-- 3-Sekunden Auto-Redirect mit UTM-Tracking -->
  <meta http-equiv="refresh" content="3; url=https://bodenbericht.de/?utm_source=geoforensic-karte&utm_medium=redirect&utm_campaign=legacy">

  <style>
    :root {
      --brand-dark: #15803d;
      --brand: #16a34a;
      --navy-900: #0c1d3a;
      --navy-800: #122b52;
      --text: #1f2937;
      --text-muted: #6b7280;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    body {
      background:
        radial-gradient(1200px 700px at 72% 120%, rgba(22, 163, 74, 0.09), transparent 60%),
        radial-gradient(1000px 650px at 15% -10%, rgba(18, 43, 82, 0.05), transparent 65%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
    }
    .logo {
      display: block;
      max-width: 380px;
      width: 100%;
      height: auto;
      margin: 0 auto 32px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy-900);
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    p.lead {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--brand);
      color: white;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 8px 24px -6px rgba(22, 163, 74, 0.45);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .cta:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px -6px rgba(22, 163, 74, 0.55);
    }
    .cta svg { width: 18px; height: 18px; }
    .redirect-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 24px;
    }
    .countdown {
      display: inline-block;
      min-width: 1ch;
      font-variant-numeric: tabular-nums;
      color: var(--brand);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="images/logo-horizontal.png"
         alt="Bodenbericht – digitale Bodenbewertung"
         width="513" height="160">

    <h1>Dieses Projekt ist in bodenbericht.de aufgegangen.</h1>
    <p class="lead">
      Das automatisierte Grundstücks-Screening auf Basis offizieller EU-Satellitendaten
      (Copernicus EGMS, LUCAS, SoilGrids) läuft ab sofort unter einer neuen Adresse.
    </p>

    <a class="cta" href="https://bodenbericht.de/?utm_source=geoforensic-karte&amp;utm_medium=redirect&amp;utm_campaign=legacy">
      Jetzt zu bodenbericht.de
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
    </a>

    <p class="redirect-note">
      Automatische Weiterleitung in <span class="countdown" id="countdown">3</span>&nbsp;Sekunden.
    </p>
  </main>

  <script>
    // Countdown UI — meta-refresh macht die eigentliche Weiterleitung
    let s = 3;
    const el = document.getElementById('countdown');
    const t = setInterval(() => {
      s -= 1;
      if (el) el.textContent = Math.max(0, s);
      if (s <= 0) clearInterval(t);
    }, 1000);
  </script>
</body>
</html>
